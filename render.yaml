services:
  - type: web
    # Render slug (legacy URL: remotematch.onrender.com). Product / domain: remotelymatch.app
    name: remotematch
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Upgrade to starter ($7/mo) in Render dashboard to eliminate cold starts
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Custom domain
      - key: APP_URL
        value: https://remotelymatch.app
      - key: CLIENT_ORIGIN
        value: https://remotelymatch.app,https://www.remotelymatch.app,https://remotematch.onrender.com
      - key: CUSTOM_DOMAIN
        value: remotelymatch.app
      - key: APP_NAME
        value: remotelymatch
      - key: VITE_APP_URL
        value: https://remotelymatch.app
      - key: VITE_APP_NAME
        value: remotelymatch
      - key: VITE_CUSTOM_DOMAIN
        value: remotelymatch.app
      - key: AGENT_HOME
        value: /app/agent-data
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Adzuna job feed — https://developer.adzuna.com
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: ADZUNA_WHAT
        value: remote
      - key: ADZUNA_WHERE
        value: United States
      - key: ADZUNA_MAX_DAYS_OLD
        value: "7"
      - key: US_REMOTE_JOBS_ONLY
        value: "1"
      - key: JOB_MIN_SALARY_USD
        value: "140000"
      - key: JOB_MIN_CALLBACK_SCORE
        value: "25"
      - key: QUALITY_FIRST_MODE
        value: "1"
      - key: JOB_MAX_AGE_DAYS
        value: "30"
      - key: JOB_AGGREGATOR_REQUIRES_ATS
        value: "1"
      - key: JOB_REQUIRE_DOMAIN_MATCH
        value: "1"
      - key: JOB_SOURCES_ENABLED
        value: remoteok,remotive,weworkremotely,greenhouse,lever,ashby,adzuna
      - key: RESEND_API_KEY
        sync: false
      # Reliable delivery: Gmail App Password (recommended primary — works for Yahoo/iCloud/Gmail)
      - key: GMAIL_SMTP_USER
        sync: false
      - key: GMAIL_SMTP_PASS
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      # Primary sender: team@remotelymatch.app (Google Workspace + Resend fallback)
      - key: EMAIL_FROM
        value: "remotelymatch <team@remotelymatch.app>"
      - key: TEAM_EMAIL
        value: team@remotelymatch.app
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:team@remotelymatch.app
      # HashiCorp Vault (open source secrets) — optional; use configure-hashicorp-vault-render.sh
      - key: SECRETS_PROVIDER
        sync: false
      - key: VAULT_ADDR
        sync: false
      - key: VAULT_TOKEN
        sync: false
      - key: VAULT_MOUNT
        value: secret
      - key: VAULT_SECRET_PATH
        value: remotelymatch
